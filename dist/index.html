<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=family-and-friends@400&display=swap" rel="stylesheet">
<style>
  /* KF Himaji — load from local install; fallback to Hachi Maru Pop (Google Fonts) */
  @font-face {
    font-family: "KF Himaji";
    src: local("KF Himaji"), local("KFhimaji");
    font-display: swap;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&display=swap" rel="stylesheet">
<title>NeruYomi V0.48B</title>
<script src="pdf.min.js"></script>
<!--
  NeruYomi V0.48B — Local manga reader
  ======================================
  Opens a local folder of manga series.
  Chrome/Edge: File System Access API (full support)
  Firefox/Safari: <input webkitdirectory> fallback

  Folder structure (images):
    LIBRARY/
      Series Name/
        Chapter 001/
        Chapter 002/

  Folder structure (PDFs):
    LIBRARY/
      Series Name/
        Chapter 001.pdf

  Keyboard shortcuts (reader):
    ← →   previous / next page
    + / -  zoom in / out
    0      reset zoom
-->
<style>
:root {
  --ink:      #27252d;
  --paper:    #f3f1f9;
  --red:      #b89ee8;
  --red-dark: #9b85d4;
  --white:    #ffffff;
  --border:   1px solid #f5f5f5;
  --hdr:      52px;
  --bar:      44px;
  --r:        3px;   /* standard border-radius */
  --r-sm:     2px;   /* small elements: badges, pills */
  --f-brand:  "Family And Friends", "Family & Friends", Arial, sans-serif;
  --f-kana:   "KF Himaji", "Hachi Maru Pop", cursive;
  --f-hdr:    "League Spartan", Arial, sans-serif;
  --f-body:   "League Spartan", Arial, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--ink); font-family: var(--f-body); font-weight: 400; color: var(--paper); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* ── HEADER ── */
header { display: flex; align-items: center; gap: 10px; padding: 0 14px; height: var(--hdr); background: var(--ink); border-bottom: 2px solid var(--red); flex-shrink: 0; z-index: 100; position: relative; transition: transform 0.3s ease, opacity 0.3s ease, height 0.3s ease; }
.logo { font-family: var(--f-brand); font-size: 24px; letter-spacing: 1px; color: var(--paper); white-space: nowrap; cursor: pointer; transition: color 0.12s; display: flex; flex-direction: column; align-items: flex-start; line-height: 1; gap: 0px; }
.logo:hover { color: var(--red); }
.logo span { color: var(--red); }
.logo span.logo-main { display: block; color: #f3f1f9; }
.logo-sub  { display: block; font-family: var(--f-kana); font-size: 13px; letter-spacing: 1px; color: #d4c6f0; line-height: 1.2; margin-top: -3px; transition: color 0.12s; }
.logo:hover .logo-sub { color: var(--red); }


.breadcrumb { display: flex; align-items: center; gap: 6px; font-family: var(--f-hdr); font-weight: 700; font-size: 15px; color: #f5f5f5; letter-spacing: 0.5px; flex: 1; overflow: hidden; min-width: 0; }
.crumb { cursor: pointer; white-space: normal; overflow: visible; text-overflow: clip; max-width: none; transition: color 0.12s; word-break: break-word; }
.crumb:hover { color: var(--red); }
.crumb.active { color: var(--paper); cursor: default; pointer-events: none; }
.sep { color: #27252e; flex-shrink: 0; }
.header-right { display: flex; gap: 7px; align-items: center; flex-shrink: 0; }
#header-search { display: flex; flex: 0 1 350px; position: relative; min-width: 0; align-items: center; gap: 5px; }
#header-search input { flex: 1; min-width: 0; background: #0c0b14; border: 1px solid #3a3748; color: var(--paper); padding: 6px 10px; font-family: var(--f-body); font-size: 12px; letter-spacing: 0.5px; outline: none; transition: border-color 0.13s; height: 30px; border-radius: var(--r); }
#header-search input:focus { border-color: var(--red); }
#header-search input::placeholder { color: #6b6478; }

/* ── BUTTONS ── */
.btn { background: transparent; border: 1.5px solid #2b2933; color: var(--paper); padding: 7px 13px; font-family: var(--f-hdr); font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.13s; white-space: nowrap; touch-action: manipulation; border-radius: var(--r); }
.btn:hover { border-color: var(--red); color: var(--red); }
.btn.primary { background: var(--red); border-color: var(--red); color: white; border: 1px solid #7c3aed; color: var(--paper);}
.btn.primary:hover { background: var(--red-dark); border-color: var(--red-dark); }
.btn.tog.on { background: var(--red); border-color: var(--red); color: white; }
.btn:disabled { opacity: 0.2; pointer-events: none; }

/* ── VIEWS ── */
.view { display: none; flex: 1; min-height: 0; overflow-y: auto; }
.view.active { display: flex; }


/* ── LANDING ── */
#view-landing { flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 20px; overflow-y: auto; }
.land-title { font-family: var(--f-brand); font-size: 48px; letter-spacing: 3px; color: var(--paper); text-align: center; line-height: 1.1; }
.land-title span { color: var(--red); }
.land-title-sub { font-family: var(--f-kana); font-size: 22px; letter-spacing: 2px; color: #d4c6f0; text-align: center; margin-top: -4px; }
.land-sub { font-family: var(--f-hdr); font-weight: 700; font-size: 14px; letter-spacing: 2px; color: #f5f5f5; text-align: center; }
.land-cards { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 600px; }
.land-box { border: 1.5px dashed #27252e; padding: 28px 36px; display: flex; flex-direction: column; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.18s; flex: 1; min-width: 180px; touch-action: manipulation; border-radius: var(--r); }
.land-box:hover { border-color: var(--red); }
.land-box:hover .land-icon { color: var(--red); }
.land-icon { font-size: 36px; color: #27252e; transition: color 0.18s; }
.land-tree { font-family: var(--f-body); font-size: 11px; color: #f5f5f5; letter-spacing: 1px; line-height: 2.2; text-align: left; border-left: 2px solid #f5f5f5; padding-left: 14px; }
.land-note { font-family: var(--f-hdr); font-weight: 700; font-size: 10px; color: #f5f5f5; letter-spacing: 1px; text-align: center; }

/* ── LOCAL LIBRARY ── */
#view-library { flex-direction: column; }
.lib-toolbar { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-bottom: var(--border); flex-shrink: 0; }
.lib-count { font-family: var(--f-hdr); font-weight: 700; font-size: 14px; color: #f5f5f5; letter-spacing: 1px; white-space: nowrap; }
.lib-count b { color: var(--red); }
#search { flex: 1; background: #0c0b14; border: 1px solid #f5f5f5; color: var(--paper); padding: 8px 12px; font-family: var(--f-body); font-size: 15px; letter-spacing: 0.5px; outline: none; transition: border-color 0.13s; border-radius: var(--r); }
#search:focus { border-color: var(--red); }
#search::placeholder { color: #6b6478; }

/* ── SEARCH PREVIEW (local) ── */
#search-preview { position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: #0c0b14; border-bottom: 2px solid var(--red); z-index: 200; display: none; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; padding: 12px 14px; gap: 10px; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; border-radius: 0 0 var(--r) var(--r); }
#search-preview::-webkit-scrollbar { display: none; }
#search-preview.show { display: flex; }
.prev-card { flex-shrink: 0; width: 72px; cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
.prev-card:hover .prev-cover { border-color: var(--red); }
.prev-cover { width: 72px; height: 108px; background: #161520; border: 2px solid #1a1924; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #f5f5f5; transition: border-color 0.14s; border-radius: var(--r); }
.prev-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.prev-name { font-family: var(--f-body); font-size: 12px; letter-spacing: 0.3px; color: #9690a2; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

/* shared card grid */
.series-grid { overflow: visible; padding: 14px; display: grid; grid-template-columns: repeat(auto-fill, minmax(176px,1fr)); gap: 12px; align-content: start; width: 100%; }
.series-grid::-webkit-scrollbar { display: none; }
.series-grid::-webkit-scrollbar-thumb { display: none; }
.series-card { cursor: pointer; display: flex; flex-direction: column; transition: transform 0.14s; touch-action: manipulation; border-radius: var(--r); overflow: hidden; position: relative; }
.series-card:hover { transform: translateY(-3px); }
.series-card:hover .s-cover { border-color: var(--red); }
.s-cover { width: 100%; aspect-ratio: 2/3; background: #0f0e18; border: 2px solid #1a1924; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; transition: border-color 0.14s; border-radius: var(--r) var(--r) 0 0; }
.s-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.s-cover-ph { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #f5f5f5; font-size: 24px; }
.s-cover-ph small { font-family: var(--f-hdr); font-weight: 700; font-size: 9px; color: #f5f5f5; letter-spacing: 0.5px; }
.s-badge { position: absolute; bottom: 0; right: 0; background: var(--red); color: white; font-family: var(--f-hdr); font-weight: 700; font-size: 9px; padding: 2px 6px; letter-spacing: 0.5px; border-radius: var(--r-sm) 0 0 0; }
.s-title { padding: 8px 10px; background: #0f0e18; font-family: var(--f-hdr); font-weight: 700; font-size: 11px; color: #d4c6f0; letter-spacing: 0.5px; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.s-meta { padding: 6px 10px 10px; background: #0f0e18; font-family: var(--f-body); font-size: 10px; color: #9690a2; letter-spacing: 0.3px; }

/* ── CHAPTERS ── */
#view-chapters { flex-direction: column; }
.ch-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 14px; border-bottom: var(--border); flex-shrink: 0; }
.ch-search-box { flex: 1; position: relative; }
#ch-search { width: 100%; background: #0c0b14; border: 1px solid #f5f5f5; color: var(--paper); padding: 8px 12px; font-family: var(--f-body); font-size: 15px; outline: none; transition: border-color 0.13s; border-radius: var(--r); }
#ch-search:focus { border-color: var(--red); }
#ch-search::placeholder { color: #6b6478; }
.ch-list { padding: 0; display: flex; flex-direction: column; }
.ch-item { padding: 10px 14px; border-bottom: var(--border); cursor: pointer; transition: background 0.14s; display: flex; align-items: center; justify-content: space-between; }
.ch-item:hover { background: #0f0e18; }
.ch-name { font-family: var(--f-hdr); font-weight: 700; font-size: 14px; color: #d4c6f0; letter-spacing: 0.5px; }
.ch-meta { font-family: var(--f-body); font-size: 11px; color: #9690a2; letter-spacing: 0.3px; }
.ch-unread { display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: var(--red); border-radius: 50%; font-family: var(--f-hdr); font-weight: 700; font-size: 10px; color: white; letter-spacing: 0.5px; flex-shrink: 0; }

/* ── READER ── */
#view-reader { flex-direction: column; align-items: stretch; }
.reader-top { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(0,0,0,0.3); gap: 8px; flex-shrink: 0; }
.reader-progress { flex: 1; display: flex; align-items: center; gap: 8px; }
.reader-progress-bar { flex: 1; height: 3px; background: #1a1924; border-radius: 2px; overflow: hidden; }
.reader-progress-fill { height: 100%; background: var(--red); transition: width 0.2s; }
.reader-progress-text { font-family: var(--f-hdr); font-weight: 700; font-size: 11px; color: #f5f5f5; letter-spacing: 0.5px; white-space: nowrap; }
.reader-controls { display: flex; gap: 6px; }
.reader-btn { background: transparent; border: 1px solid #3a3748; color: var(--paper); padding: 5px 10px; font-family: var(--f-body); font-size: 12px; cursor: pointer; transition: all 0.13s; border-radius: var(--r); }
.reader-btn:hover { border-color: var(--red); color: var(--red); }
.reader-content { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: auto; position: relative; }
.reader-content.fit-width img, .reader-content.fit-page img { max-width: 100%; height: auto; display: block; }
.reader-content.fit-height img { width: auto; max-height: 100%; display: block; }
.reader-content.original img { display: block; }
#reader-image { max-width: 100%; max-height: 100%; object-fit: contain; user-select: none; }
.reader-nav { display: flex; gap: 8px; padding: 8px 12px; background: rgba(0,0,0,0.3); flex-shrink: 0; }
.nav-wide { flex: 1; display: flex; gap: 8px; }
.nav-btn { flex: 1; background: transparent; border: 1px solid #3a3748; color: var(--paper); padding: 8px 12px; font-family: var(--f-hdr); font-weight: 700; font-size: 12px; letter-spacing: 0.5px; cursor: pointer; transition: all 0.13s; border-radius: var(--r); }
.nav-btn:hover { border-color: var(--red); color: var(--red); }
.nav-btn:disabled { opacity: 0.2; pointer-events: none; }

/* ── SETTINGS MODAL ── */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-overlay.open { display: flex; }
.modal { background: #0f0e18; border: 2px solid #1a1924; border-radius: var(--r); max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; display: flex; flex-direction: column; }
.modal-title { font-family: var(--f-hdr); font-weight: 700; font-size: 16px; letter-spacing: 1px; padding: 16px; color: var(--paper); border-bottom: 1px solid #1a1924; }
.modal-content { padding: 16px; flex: 1; overflow-y: auto; }
.modal-group { margin-bottom: 16px; }
.modal-label { font-family: var(--f-hdr); font-weight: 700; font-size: 12px; letter-spacing: 0.5px; color: #f5f5f5; margin-bottom: 6px; display: block; text-transform: uppercase; }
.modal-input, .modal-select { width: 100%; background: #0c0b14; border: 1px solid #3a3748; color: var(--paper); padding: 8px 10px; font-family: var(--f-body); font-size: 13px; outline: none; transition: border-color 0.13s; border-radius: var(--r); }
.modal-input:focus, .modal-select:focus { border-color: var(--red); }
.modal-checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.modal-checkbox input { width: 16px; height: 16px; cursor: pointer; }
.modal-footer { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #1a1924; }
.modal-footer .btn { flex: 1; }
.storage-status { font-family: var(--f-body); font-size: 11px; color: #9690a2; margin-top: 8px; }

/* ── UTILITY ── */
.spin { width: 20px; height: 20px; border: 2px solid #3a3748; border-top-color: var(--red); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { display: flex; align-items: center; justify-content: center; color: #9690a2; font-size: 12px; gap: 8px; }
</style>
</head><body>

<!-- MAIN VIEW CONTAINER -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<main>
  <!-- LANDING -->
  <div id="view-landing" class="view active">
    <div class="land-title"><span>Neru</span>Yomi</div>
    <div class="land-title-sub">あなたの漫画ライブラリ</div>
    <div class="land-sub">Local Manga Reader</div>
    <div class="land-cards">
      <div class="land-box" id="land-open">
        <div class="land-icon">📂</div>
        <div style="font-family:var(--f-hdr);font-weight:700;font-size:13px;letter-spacing:1px;color:#f5f5f5">SELECT LIBRARY</div>
      </div>
      <div class="land-box" onclick="openSettings()">
        <div class="land-icon">⚙️</div>
        <div style="font-family:var(--f-hdr);font-weight:700;font-size:13px;letter-spacing:1px;color:#f5f5f5">SETTINGS</div>
      </div>
    </div>
    <div class="land-tree">
      LIBRARY/<br>
      ├─ Series 001/<br>
      │ ├─ Chapter 001/<br>
      │ └─ Chapter 002/<br>
      └─ Series 002/
    </div>
    <div class="land-note">Supports: Image folders · PDF files</div>
  </div>

  <!-- LIBRARY -->
  <div id="view-library" class="view">

      <div class="lib-count">Library: <b id="lib-count">0</b></div>

  <!-- CHAPTERS -->

      <div class="ch-search-box">
        <input id="ch-search" type="text" placeholder="Search chapters...">

    </div>
    <div id="ch-list" class="ch-list"></div>
  </div>

  <!-- READER -->
  <div id="view-reader" class="view">
    <div class="reader-top">
      <div class="reader-progress">
        <div class="reader-progress-bar">
          <div class="reader-progress-fill" id="reader-progress-fill"></div>
        </div>
        <span class="reader-progress-text" id="reader-progress-text">1 / 1</span>
      </div>
      <div class="reader-controls">
        <button class="reader-btn" onclick="toggleReader()">▭</button>
      </div>
    </div>
    <div id="reader-content" class="reader-content fit-page">
      <img id="reader-image" src="">
    </div>
    <div class="reader-nav">
      <button class="nav-btn" id="nav-prev" onclick="prevPage()">← PREV</button>
      <div class="nav-wide">
        <button class="nav-btn" id="nav-first" onclick="firstPage()">⏮ FIRST</button>
        <button class="nav-btn" id="nav-last" onclick="lastPage()">LAST ⏭</button>
      </div>
      <button class="nav-btn" id="nav-next" onclick="nextPage()">NEXT →</button>
    </div>
  </div>
</main>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- SETTINGS MODAL -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div id="settings-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">⚙️ Settings</div>
    <div class="modal-content">
      <div class="modal-group">
        <label class="modal-label">Theme</label>
        <select id="theme-select" class="modal-select" onchange="changeSetting('theme', this.value)">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div class="modal-group">
        <label class="modal-label">Reader Mode</label>
        <select id="reader-mode-select" class="modal-select" onchange="changeSetting('readerMode', this.value)">
          <option value="fit-page">Fit to Page</option>
          <option value="fit-width">Fit to Width</option>
          <option value="fit-height">Fit to Height</option>
          <option value="original">Original Size</option>
        </select>
      </div>
      <div class="modal-group">
        <label class="modal-label">Reading Direction</label>
        <select id="reading-dir-select" class="modal-select" onchange="changeSetting('readingDirection', this.value)">
          <option value="ltr">Left to Right</option>
          <option value="rtl">Right to Left</option>
        </select>
      </div>
      <div class="modal-group">
        <label class="modal-label">Auto-Save Progress</label>
        <label class="modal-checkbox">
          <input type="checkbox" id="autosave-checkbox" onchange="changeSetting('autoSaveProgress', this.checked)">
          <span>Automatically save reading position</span>
        </label>
      </div>
      <div class="modal-group">
        <label class="modal-label">Storage</label>
        <div class="storage-status">
          <strong>Database Status:</strong> <span id="db-status">Initializing...</span><br>
          <strong>Data Stored:</strong> <span id="db-size">Calculating...</span>
        </div>
      </div>
      <div class="modal-group">
        <button class="btn" onclick="exportSettings()" style="width:100%;margin-bottom:8px;">📥 Export Settings</button>
        <button class="btn" onclick="importSettings()" style="width:100%;margin-bottom:8px;">📤 Import Settings</button>
        <button class="btn" onclick="clearAllData()" style="width:100%;background:#b89ee8;border-color:#b89ee8;opacity:0.6;">🗑️ Clear All Data</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn primary" onclick="closeSettings()" style="flex:1;">CLOSE</button>
    </div>
  </div>
</div>

<input type="file" id="file-picker" webkitdirectory mozdirectory="true" style="display:none;" multiple>
<input type="file" id="import-file" type="application/json" style="display:none;">

<script>
// ═══════════════════════════════════════════════════════════════
// INDEXEDDB STORAGE SYSTEM
// ═══════════════════════════════════════════════════════════════

class StorageManager {
  constructor() {
    this.db = null;
    this.ready = this.init();
  }

  async init() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open('NeruYomiDB', 1);
      
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        this.db = request.result;
        resolve();
      };
      
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        
        // Settings store
        if (!db.objectStoreNames.contains('settings')) {
          db.createObjectStore('settings', { keyPath: 'key' });
        }
        
        // Manga metadata store
        if (!db.objectStoreNames.contains('manga')) {
          const mangaStore = db.createObjectStore('manga', { keyPath: 'id' });
          mangaStore.createIndex('name', 'name', { unique: false });
        }
        
        // Reading progress store
        if (!db.objectStoreNames.contains('progress')) {
          db.createObjectStore('progress', { keyPath: 'seriesId' });
        }
        
        // MangaUpdates overrides store
        if (!db.objectStoreNames.contains('muOverrides')) {
          db.createObjectStore('muOverrides', { keyPath: 'seriesName' });
        }
      };
    });
  }

  async set(storeName, key, value) {
    await this.ready;
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(storeName, 'readwrite');
      const store = tx.objectStore(storeName);
      const data = typeof value === 'object' ? { key, ...value } : { key, value };
      const request = store.put(data);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }

  async get(storeName, key) {
    await this.ready;
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(storeName, 'readonly');
      const store = tx.objectStore(storeName);
      const request = store.get(key);
      request.onsuccess = () => resolve(request.result?.value ?? request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async getAll(storeName) {
    await this.ready;
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(storeName, 'readonly');
      const store = tx.objectStore(storeName);
      const request = store.getAll();
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async delete(storeName, key) {
    await this.ready;
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(storeName, 'readwrite');
      const store = tx.objectStore(storeName);
      const request = store.delete(key);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }

  async clear(storeName) {
    await this.ready;
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction(storeName, 'readwrite');
      const store = tx.objectStore(storeName);
      const request = store.clear();
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }

  async getSize() {
    if (!navigator.storage?.estimate) return 'N/A';
    const estimate = await navigator.storage.estimate();
    const used = estimate.usage;
    return used > 1024 * 1024 
      ? `${(used / (1024 * 1024)).toFixed(2)} MB`
      : `${(used / 1024).toFixed(2)} KB`;
  }
}

const storage = new StorageManager();

// ═══════════════════════════════════════════════════════════════
// SETTINGS MANAGEMENT
// ═══════════════════════════════════════════════════════════════

const defaultSettings = {
  theme: 'dark',
  readerMode: 'fit-page',
  readingDirection: 'ltr',
  autoSaveProgress: true,
  zoom: 100
};

let settings = { ...defaultSettings };

async function loadSettings() {
  try {
    const allSettings = await storage.getAll('settings');
    if (allSettings.length > 0) {
      allSettings.forEach(item => {
        if (item.key && item.key !== 'value') {
          settings[item.key] = item.value ?? item[item.key];
        }
      });
    }
    applySettings();
  } catch (e) {
    console.error('Failed to load settings:', e);
  }
}

function applySettings() {
  document.getElementById('theme-select').value = settings.theme;
  document.getElementById('reader-mode-select').value = settings.readerMode;
  document.getElementById('reading-dir-select').value = settings.readingDirection;
  document.getElementById('autosave-checkbox').checked = settings.autoSaveProgress;
  
  // Apply theme
  if (settings.theme === 'light') {
    document.body.style.filter = 'invert(1) hue-rotate(180deg)';
  } else {
    document.body.style.filter = 'none';
  }
}

async function changeSetting(key, value) {
  settings[key] = value;
  await storage.set('settings', key, value);
  applySettings();
  updateStorageStatus();
}

async function exportSettings() {
  try {
    const allData = {
      settings: await storage.getAll('settings'),
      manga: await storage.getAll('manga'),
      progress: await storage.getAll('progress'),
      muOverrides: await storage.getAll('muOverrides'),
      exportDate: new Date().toISOString()
    };
    
    const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `neruyomi-backup-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Export failed: ' + e.message);
  }
}

async function importSettings() {
  const fileInput = document.getElementById('import-file');
  fileInput.click();
  
  fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      
      // Import data
      if (data.settings) {
        await storage.clear('settings');
        for (const item of data.settings) {
          await storage.set('settings', item.key, item);
        }
      }
      if (data.manga) {
        await storage.clear('manga');
        for (const item of data.manga) {
          await storage.set('manga', item.id, item);
        }
      }
      if (data.progress) {
        await storage.clear('progress');
        for (const item of data.progress) {
          await storage.set('progress', item.seriesId, item);
        }
      }
      if (data.muOverrides) {
        await storage.clear('muOverrides');
        for (const item of data.muOverrides) {
          await storage.set('muOverrides', item.seriesName, item);
        }
      }
      
      await loadSettings();
      alert('Settings imported successfully! Refresh the page to see changes.');
    } catch (e) {
      alert('Import failed: ' + e.message);
    }
  };
}

async function clearAllData() {
  if (!confirm('This will delete all stored data. Are you sure?')) return;
  
  try {
    await storage.clear('settings');
    await storage.clear('manga');
    await storage.clear('progress');
    await storage.clear('muOverrides');
    
    settings = { ...defaultSettings };
    alert('All data cleared. Reloading...');
    location.reload();
  } catch (e) {
    alert('Clear failed: ' + e.message);
  }
}

async function updateStorageStatus() {
  const status = await storage.getSize();
  document.getElementById('db-status').textContent = '✓ Ready';
  document.getElementById('db-size').textContent = status;
}

// ═══════════════════════════════════════════════════════════════
// READING PROGRESS AUTO-SAVE
// ═══════════════════════════════════════════════════════════════

async function saveProgress(seriesId, chapterIndex, pageIndex) {
  if (!settings.autoSaveProgress) return;
  try {
    await storage.set('progress', seriesId, {
      seriesId,
      chapterIndex,
      pageIndex,
      timestamp: Date.now()
    });
  } catch (e) {
    console.error('Failed to save progress:', e);
  }
}

async function loadProgress(seriesId) {
  try {
    return await storage.get('progress', seriesId);
  } catch (e) {
    console.error('Failed to load progress:', e);
    return null;
  }
}

// ═══════════════════════════════════════════════════════════════
// MANGA METADATA STORAGE
// ═══════════════════════════════════════════════════════════════

async function saveMangaMetadata(manga) {
  try {
    await storage.set('manga', manga.id, {
      ...manga,
      savedAt: Date.now()
    });
  } catch (e) {
    console.error('Failed to save manga metadata:', e);
  }
}

async function loadMangaMetadata(id) {
  try {
    return await storage.get('manga', id);
  } catch (e) {
    console.error('Failed to load manga metadata:', e);
    return null;
  }
}

function $(id) { return document.getElementById(id); }

function show(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + viewId).classList.add('active');
}

function openSettings() {
  $('settings-modal').classList.add('open');
  updateStorageStatus();
}

function closeSettings() {
  $('settings-modal').classList.remove('open');
}

function toggleReader() {
  const modes = ['fit-page', 'fit-width', 'fit-height', 'original'];
  const current = settings.readerMode;
  const idx = modes.indexOf(current);
  const next = modes[(idx + 1) % modes.length];
  changeSetting('readerMode', next);
}

function bc(view) {
  const bcEl = $('bc'), hrEl = $('hr');
  const settingsBtn = `<button class="settings-btn" onclick="openSettings()">⚙️</button>`;
  
  if (view === 'landing') {
    bcEl.innerHTML = '';
    hrEl.innerHTML = `<button class="btn primary" id="open-btn">📂 OPEN LIBRARY</button>${settingsBtn}`;
  } else if (view === 'library') {
    bcEl.innerHTML = `<span class="crumb active">LIBRARY</span>`;
    hrEl.innerHTML = `<button class="btn primary" onclick="openLibrary()">📂 CHANGE</button>${settingsBtn}`;
  } else if (view === 'chapters') {
    bcEl.innerHTML = `<span class="crumb" onclick="show('library');bc('library')">LIBRARY</span><span class="sep">/</span><span class="crumb active">SERIES</span>`;
    hrEl.innerHTML = `<button class="btn primary" onclick="openLibrary()">📂 CHANGE</button>${settingsBtn}`;
  }
  bc._current = view;
}

function openLibrary() {
  $('file-picker').click();
}

  await storage.ready;

initApp().catch(e => console.error('App init failed:', e));
